       <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
       <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
       <link rel="manifest" href="./site.webmanifest">

  <body>
    <!-- Intro Screen -->
    <div id="intro-screen" class="screen">
      <div class="intro-content">
        <h1>Welcome to the resistance</h1>
        <!-- <p>Shout! Smack! Fight back!</p> -->

        <button id="start-button">Start Game</button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
      <div id="stars"></div>

      <div id="game-hud">
        <div id="term-progress-container">

          <div id="term-progress-bar"></div>
                    <!-- <marquee behavior="alternate" scrollamount="1" id="term-progress-label">UNLESS WE DO SOMETHING</marquee> -->

          <div id="term-progress-label">UNLESS WE DO SOMETHING</div>
        </div>
        <div id="score" class="hidden">Score: <span id="score-value">0</span></div>
      </div>

      <!-- Country Status Meters -->
      <div id="country-status">
        <div class="country-meter" id="canada-meter">
          <div class="country-label">Canada</div>
          <div class="meter-container">
            <div class="freedom-meter" id="canada-occupation"></div>
          </div>
          <div class="meter-container">
            <div class="resistance-meter" id="canada-resistance"></div>
          </div>
        </div>

        <div class="country-meter" id="mexico-meter">
          <div class="country-label">Mexico</div>
          <div class="meter-container">
            <div class="freedom-meter" id="mexico-occupation"></div>
          </div>
          <div class="meter-container">
            <div class="resistance-meter" id="mexico-resistance"></div>
          </div>
        </div>

        <div class="country-meter" id="greenland-meter">
          <div class="country-label">Greenland</div>
          <div class="meter-container">
            <div class="freedom-meter" id="greenland-occupation"></div>
          </div>
          <div class="meter-container">
            <div class="resistance-meter" id="greenland-resistance"></div>
          </div>
        </div>
      </div>

      <!-- Game Container -->
      <div id="game-container">
        <!-- Map Background -->
        <img id="map-background" src="images/world-map.png" alt="Interactive world map showing Canada, Mexico, and Greenland for the resistance game" />

        <div id="canada-flag-overlay" class="country-flag-overlay" aria-label="Canadian flag overlay with USA flag"></div>
        <div id="mexico-flag-overlay" class="country-flag-overlay" aria-label="Mexican flag overlay with USA flag"></div>
        <div id="greenland-flag-overlay" class="country-flag-overlay" aria-label="Greenland flag overlay with USA flag"></div>

        <!-- Trump sprite container -->
        <div id="trump-sprite-container">
          <div id="trump-hand-hitbox"></div>
          <div id="trump-sprite" aria-label="Interactive Trump character sprite"></div>
        </div>
        <div id="trump-hand-visual" aria-label="Trump's hand that can be interacted with"></div>
      </div>

      <!-- Simplified Debug Panel -->
      <div id="debug-panel">
        <h3>Debug Tools</h3>
        <button id="toggle-hitbox">Show Hitbox</button>
        <button id="test-animation">Test Animation</button>
      </div>
    </div>


    <div id="game-over-screen" class="screen hidden">
      <div class="game-over-content">
        <h1 id="game-result">Game Over</h1>
        <h2>Resistance Score: <span id="final-score">0</span></h2>
        <div class="game-over-stats-container">
          <p class="stats-text game-over-stat-value">YOU BLOCKED <span id="blocks-stat">0 attacks</span> AND SURVIVED <span id="time-stat">10 months</span></p>
          <p><a href="https://docs.google.com/forms/d/1SuNDqRFRY3NxZYYjb78tk8uBCQs1Gn5M1Sj8PMXPx4o" target="_blank" class="voice">Join the resistance! Add your voice to this game</a>
            </p>
          </div>
        <div id="trump-game-over-animation" class="trump-victory-animation"></div>
        <div class="game-over-button-container">
          <!-- <button id="share-button" class="hand-drawn-button" href="https://vote.gov" target="_blank">share</button> -->
        </div>
        <!-- New social share buttons -->
        <div class="social-buttons-row">
          <button id="download-screenshot" class="social-button download-button" aria-label="Download Screenshot">↓</button>
          <button id="share-twitter" class="social-button twitter-button" aria-label="Share on Twitter">X</button>
          <button id="share-facebook" class="social-button facebook-button" aria-label="Share on Facebook">f</button>
          <button id="share-bluesky" class="social-button bluesky-button" aria-label="Share on Bluesky">B</button>
          <button id="share-mastodon" class="social-button mastodon-button" aria-label="Share on Mastodon">M</button>
        </div>
        <!-- <p class="stats-text game-over-cto"></p> -->
      </div>
    </div>

    <script src="audio-manager.js"></script>
    <script src="game-logger.js" defer></script>

    <script src="animation-manager.js"></script>
    <script src="smack-manager.js"></script>
    <!-- <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script> -->

    <script src="html2canvas.js" defer></script>
    <script src="screen-shot-share.js" defer></script>


    <script src="protestor-hitbox-manager.js"></script>

    <script src="debug-manager.js" defer></script>
    <script src="ufo-manager.js" defer></script>
    <script src="stars.js" defer></script>
    <script src="freedom-manager.js" defer></script>
    <script src="handhitbox-manager.js"></script>
    <script src="game-speed-manager.js"></script>

    <script src="game.js"></script>
  </body>
</html>
