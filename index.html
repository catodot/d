<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
    <title>Presidential Grab</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Alfa+Slab+One&display=swap" rel="stylesheet" />

    <!-- Stylesheets -->
    <link href="styles.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=PT+Mono&display=swap" rel="stylesheet" />

    <meta name="author" content="ada" />
    <meta name="description" content="Presidental Grab" />
    <meta property="og:title" content="Presidental Grab" />
    <meta property="og:description" content="Someone needs to stop him" />
    <meta property="og:image" content="images/presidentalgrab.png" />
    <meta property="og:url" content="" />
    <meta property="og:type" content="webpage" />
    <meta name="twitter:title" content="Presidental Grab" />
    <meta name="twitter:description" content="Someone needs to stop him" />
    <meta name="twitter:image" content="images/presidentalgrab.png" id="indexImage" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <!-- Intro Screen -->
    <div id="intro-screen" class="screen">
      <div class="intro-content">
        <h1>Welcome to the resistance</h1>

        <button id="start-button">Start Game</button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
      <!-- Game HUD -->
      <div id="game-hud">
        <div id="timer">Time: <span id="time-value">60</span></div>
        <div id="score">Score: <span id="score-value">0</span></div>
      </div>

      <!-- Country Status Meters -->
      <div id="country-status">
        <div class="country-meter" id="canada-meter">
          <div class="country-label">Canada</div>
          <div class="meter-container">
            <div class="freedom-meter" id="canada-occupation"></div>
          </div>
          <div class="meter-container">
            <div class="resistance-meter" id="canada-resistance"></div>
          </div>
        </div>

        <div class="country-meter" id="mexico-meter">
          <div class="country-label">Mexico</div>
          <div class="meter-container">
            <div class="freedom-meter" id="mexico-occupation"></div>
          </div>
          <div class="meter-container">
            <div class="resistance-meter" id="mexico-resistance"></div>
          </div>
        </div>

        <div class="country-meter" id="greenland-meter">
          <div class="country-label">Greenland</div>
          <div class="meter-container">
            <div class="freedom-meter" id="greenland-occupation"></div>
          </div>
          <div class="meter-container">
            <div class="resistance-meter" id="greenland-resistance"></div>
          </div>
        </div>
      </div>

      <!-- Game Container -->
      <div id="game-container">
        <!-- Map Background -->
        <img id="map-background" src="images/world-map.png" alt="World Map" />

        <div id="canada-flag-overlay" class="country-flag-overlay"></div>
        <div id="mexico-flag-overlay" class="country-flag-overlay"></div>
        <div id="greenland-flag-overlay" class="country-flag-overlay"></div>

        <!-- Trump sprite container -->
        <div id="trump-sprite-container">
          <div id="trump-sprite"></div>
          <div id="hand-hitbox"></div>
        </div>
      </div>

      <!-- Simplified Debug Panel -->
      <div id="debug-panel">
        <h3>Debug Tools</h3>
        <button id="toggle-hitbox">Show Hitbox</button>
        <button id="test-animation">Test Animation</button>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
      <div class="game-over-content">
        <h1 id="game-result">Game Over</h1>
        <h2>Your Resistance Score: <span id="final-score">0</span></h2>
        <div class="stats-container">
          <div class="stat-item">Successful Blocks: <span id="blocks-stat">0</span></div>
          <!-- <div class="stat-item">Countries Defended: <span id="defended-stat">0</span></div> -->
          <div class="stat-item">Time Survived: <span id="time-stat">0</span> seconds</div>
        </div>
        <p id="game-message"></p>
        <button id="restart-button">Play Again</button>
        <button id="share-button">Share Results</button>
      </div>
    </div>

    <script src="audio-manager.js"></script>
    <script src="game-logger.js"></script>

    <script src="animation-manager.js"></script>
    <script src="smack-manager.js"></script>

    <script src="debug-manager.js"></script>
    <script src="effects-manager.js"></script>
    <script src="ufo-manager.js"></script>
    <script src="stars.js"></script>
    <script src="freedom-manager.js"></script>

    <script src="game.js"></script>
  </body>
</html>
