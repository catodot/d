<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
    <title>Presidential Grab</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        overflow: hidden;
        touch-action: manipulation;
        user-select: none;
      }

      .screen {
        position: absolute;
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to bottom, #87ceeb, #1e90ff);
        z-index: 10;
      }

      .hidden {
        display: none;
      }

      /* Intro Screen */
      .intro-content {
        background-color: rgba(255, 255, 255, 0.9);
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        max-width: 80%;
      }

      .intro-content h1 {
        color: #3c3b6e;
        margin-bottom: 10px;
      }

      .intro-content h2 {
        color: #b22234;
        margin-bottom: 20px;
      }

      .intro-content p {
        margin-bottom: 15px;
        line-height: 1.4;
      }

      button {
        background-color: #3c3b6e;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 12px;
        cursor: pointer;
        margin-top: 5px;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #b22234;
      }

      /* Game Screen */
      #game-screen {
        background: linear-gradient(to bottom, #87ceeb, #1e90ff);
      }

      #game-hud {
        position: absolute;
        top: 10px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 10px 20px;
        font-size: 1.2em;
        color: white;
        z-index: 15;
        pointer-events: none;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      }

      /* Game container */
      #game-container {
        width: 100%;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      /* Map background */
      #map-background {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        max-width: 100%;
        max-height: 100vh;
        z-index: -100;
      }

      .drag-point {
        fill: blue;
        cursor: move;
        stroke: white;
        stroke-width: 2px;
        pointer-events: all !important;
        z-index: 1000;
      }

      .draggable-country {
        cursor: move;
        pointer-events: all !important;
        stroke: red;
        stroke-width: 2px;
        pointer-events: all !important;
      }

      .draggable-country {
        cursor: move;
        pointer-events: all !important;
      }

      .country-path.draggable-country,
      .drag-point {
        pointer-events: all !important;
      }

      .draggable-country,
      .drag-point {
        pointer-events: all;
      }

      .debug-outline {
        fill: rgba(255, 0, 0, 0.2) !important;
        stroke: red !important;
        stroke-width: 2px !important;
      }

      .targeted {
        fill: rgba(160, 160, 160, 0.5) !important;
      }

      /* Trump sprite elements */
      #trump-sprite-container {
        position: absolute;
        width: 500px; /* Increased from 200px - adjust as needed */
        height: 1000px; /* Increased from 400px - adjust as needed */
        overflow: hidden;
        z-index: 3;
      }

      #trump-sprite {
        position: absolute;
        width: 100%;
        height: 100%;
        background-repeat: no-repeat;
        background-position: 0 0;
      }

      #hand-hitbox {
        position: absolute;
        width: 40px;
        height: 40px;
        background-color: transparent;
        pointer-events: all;
        z-index: 2000;
        cursor: pointer;
      }

      /* Country meters in HUD */
      #country-status {
        position: absolute;
        top: 50px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 10px;
        z-index: 15;
        pointer-events: none;
      }

      .country-meter {
        background-color: rgba(255, 255, 255, 0.7);
        border-radius: 5px;
        padding: 5px 10px;
        width: 120px;
        text-align: center;
      }

      .country-label {
        font-weight: bold;
        font-size: 14px;
        margin-bottom: 5px;
      }

      .meter-container {
        height: 8px;
        background-color: rgba(0, 0, 0, 0.2);
        border-radius: 4px;
        overflow: hidden;
        margin: 3px 0;
      }

      .resilience-meter {
        height: 100%;
        width: 0%;
        background: linear-gradient(to right, #00ff00, #ffff00, #00ff00);
        transition: width 0.3s;
      }

      .freedom-meter {
        height: 100%;
        width: 100%;
        background: linear-gradient(to right, #ff0000, #ff5e00, #ffcc00);
        transition: width 0.5s;
      }

      /* Particle Effects */
      .particle {
        position: absolute;
        background-color: #ffd700;
        border-radius: 50%;
        pointer-events: none;
        z-index: 6;
      }

      /* Game Over Screen */
      .game-over-content {
        background-color: rgba(255, 255, 255, 0.9);
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        max-width: 80%;
      }

      .game-over-content h1 {
        color: #3c3b6e;
        margin-bottom: 10px;
      }

      .game-over-content h2 {
        color: #b22234;
        margin-bottom: 20px;
      }

      .game-over-content p {
        margin-bottom: 20px;
        line-height: 1.4;
      }

      /* Stats Display */
      .stats-container {
        margin: 15px 0;
        text-align: left;
        background-color: rgba(255, 255, 255, 0.5);
        padding: 10px;
        border-radius: 5px;
      }

      .stat-item {
        margin: 5px 0;
      }

      /* Simplified Debug Panel */
      #debug-panel {
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 5px;
        border-radius: 3px;
        z-index: 1000;
        display: none;
        font-size: 12px;
        max-width: 250px;
      }

      #debug-panel button {
        padding: 3px 6px;
        margin: 2px;
        font-size: 10px;
        display: inline-block;
      }

      #debug-panel h3 {
        margin: 2px 0;
        font-size: 12px;
      }

      #coordinates-output {
        max-height: 100px;
        overflow-y: auto;
        font-size: 10px;
      }

      .country-flag-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background-size: cover;
        background-position: center;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        transition: opacity 0.5s ease;
      }
      /* Responsive design */
      @media (max-width: 768px) {
        #game-hud {
          font-size: 1em;
        }

        #country-status {
          flex-direction: column;
          align-items: center;
          gap: 5px;
        }

        .country-meter {
          width: 90px;
          padding: 3px 5px;
        }

        .country-label {
          font-size: 12px;
        }
      }

      .touch-ripple {
        position: absolute;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.4);
        transform: scale(0);
        pointer-events: none;
        animation: ripple 0.5s ease-out;
      }

      @keyframes ripple {
        0% {
          transform: scale(0);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.5);
          opacity: 0;
        }
      }

      /* Increase touch targets for mobile */
      button,
      .control-button {
        min-height: 44px;
        min-width: 44px;
      }

      /* Prevent unwanted selection */
      #game-container {
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: manipulation;
      }

      /* audio  */
      /* Audio Controls Styling */
      .game-controls {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 100;
        display: flex;
        gap: 10px;
      }

      .control-button {
        background-color: rgba(60, 59, 110, 0.7);
        color: white;
        margin-top: 5rem;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.2s;
        font-size: 18px;
      }

      .control-button:hover {
        background-color: rgba(178, 34, 52, 0.8);
        transform: scale(1.1);
      }

      .control-button:active {
        transform: scale(0.95);
      }

      .control-button .icon {
        pointer-events: none;
      }

      /* Sound visualization effects */
      .sound-ripple {
        position: absolute;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.4);
        transform: scale(0);
        pointer-events: none;
        animation: ripple 0.6s ease-out;
      }

      @keyframes ripple {
        0% {
          transform: scale(0);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.5);
          opacity: 0;
        }
      }

      /* Volume indicator for debug */
      .volume-indicator {
        position: absolute;
        background-color: rgba(255, 215, 0, 0.6);
        border-radius: 3px;
        padding: 2px 8px;
        font-size: 12px;
        color: black;
        pointer-events: none;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.3s, transform 0.3s;
      }

      .volume-indicator.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <!-- Intro Screen -->
    <div id="intro-screen" class="screen">
      <div class="intro-content">
        <h1>Presidential Grab</h1>
        <p>Protect neighboring countries from annexation! Tap/click on Trump's hand when he reaches out to grab them.</p>
        <button id="start-button">Start Game</button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
      <!-- Game HUD -->
      <div id="game-hud">
        <div id="timer">Time: <span id="time-value">60</span>s</div>
        <div id="score">Score: <span id="score-value">0</span></div>
      </div>

      <!-- Country Status Meters -->
      <div id="country-status">
        <div class="country-meter" id="canada-meter">
          <div class="country-label">Canada</div>
          <div class="meter-container">
            <div class="freedom-meter" id="canada-freedom"></div>
          </div>
          <div class="meter-container">
            <div class="resilience-meter" id="canada-resilience"></div>
          </div>
        </div>

        <div class="country-meter" id="mexico-meter">
          <div class="country-label">Mexico</div>
          <div class="meter-container">
            <div class="freedom-meter" id="mexico-freedom"></div>
          </div>
          <div class="meter-container">
            <div class="resilience-meter" id="mexico-resilience"></div>
          </div>
        </div>

        <div class="country-meter" id="greenland-meter">
          <div class="country-label">Greenland</div>
          <div class="meter-container">
            <div class="freedom-meter" id="greenland-freedom"></div>
          </div>
          <div class="meter-container">
            <div class="resilience-meter" id="greenland-resilience"></div>
          </div>
        </div>
      </div>

      <!-- Game Container -->
      <div id="game-container">
        <!-- Map Background -->
        <img id="map-background" src="images/world-map.png" alt="World Map" />

        <div id="canada-flag-overlay" class="country-flag-overlay"></div>
        <div id="mexico-flag-overlay" class="country-flag-overlay"></div>
        <div id="greenland-flag-overlay" class="country-flag-overlay"></div>

        <!-- Trump sprite container -->
        <div id="trump-sprite-container">
          <div id="trump-sprite"></div>
          <div id="hand-hitbox"></div>
        </div>
      </div>

      <!-- Simplified Debug Panel -->
      <div id="debug-panel">
        <h3>Debug Tools</h3>
        <button id="toggle-hitbox">Show Hitbox</button>
        <button id="test-animation">Test Animation</button>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
      <div class="game-over-content">
        <h1 id="game-result">Game Over</h1>
        <h2>Your Resistance Score: <span id="final-score">0</span></h2>
        <div class="stats-container">
          <div class="stat-item">Successful Blocks: <span id="blocks-stat">0</span></div>
          <div class="stat-item">Countries Defended: <span id="defended-stat">0</span></div>
          <div class="stat-item">Time Survived: <span id="time-stat">0</span> seconds</div>
        </div>
        <p id="game-message"></p>
        <button id="restart-button">Play Again</button>
        <button id="share-button">Share Results</button>
      </div>
    </div>

    <script src="audio-manager.js"></script>
    <script src="game-logger.js"></script>

    <script src="animation-manager.js"></script>
    <script src="smack-manager.js"></script>

    <script src="debug-manager.js"></script>
    <script src="effects-manager.js"></script>
    <!-- <script src="touch-input-manager.js"></script> -->

 <script>
  // Main game script
document.addEventListener("DOMContentLoaded", function () {
  // Debug mode - set to true during development, false for production
  const DEBUG_MODE = true;

  const audioManager = new AudioManager();
  let animationManager;
  let debugManager;

  // Game State
  const gameState = {
    isPlaying: false,
    isPaused: false,
    score: 0,
    timeRemaining: 60,
    baseGrabInterval: 2000, // Time between grabs at normal speed (ms)
    gameSpeedMultiplier: 1.0, // Base speed multiplier (1.0 = normal)
    minSpeedMultiplier: 0.5, // Slowest game speed (0.5x)
    maxSpeedMultiplier: 2.0, // Fastest game speed (2.0x)

    grabTimer: null,
    countdownTimer: null,
    currentTarget: null,
    trumpGrowth: 1.0,
    consecutiveHits: 0,
    stats: {
      successfulBlocks: 0,
      countriesDefended: 0,
    },
    mapScale: 1.0,
    mapOffsetX: 0,
    mapOffsetY: 0,

    countries: {
      canada: {
        claims: 0,
        maxClaims: 3,
        resilience: 0,
        maxResilience: 5,
        freedom: 100,
      },
      mexico: {
        claims: 0,
        maxClaims: 3,
        resilience: 0,
        maxResilience: 5,
        freedom: 100,
      },
      greenland: {
        claims: 0,
        maxClaims: 3,
        resilience: 0,
        maxResilience: 5,
        freedom: 100,
      },
    },
  };

  // Game Elements
  const elements = {
    screens: {
      intro: document.getElementById("intro-screen"),
      game: document.getElementById("game-screen"),
      gameOver: document.getElementById("game-over-screen"),
    },
    buttons: {
      start: document.getElementById("start-button"),
      restart: document.getElementById("restart-button"),
      share: document.getElementById("share-button"),
    },
    hud: {
      time: document.getElementById("time-value"),
      score: document.getElementById("score-value"),
      finalScore: document.getElementById("final-score"),
      result: document.getElementById("game-result"),
      message: document.getElementById("game-message"),
      stats: {
        blocks: document.getElementById("blocks-stat"),
        defended: document.getElementById("defended-stat"),
        time: document.getElementById("time-stat"),
      },
    },
    game: {
      container: document.getElementById("game-container"),
      map: document.getElementById("map-background"),
    },
    countries: {
      usa: document.getElementById("usa"),
      canada: document.getElementById("canada"),
      mexico: document.getElementById("mexico"),
      greenland: document.getElementById("greenland"),
    },
    meters: {
      canada: {
        container: document.getElementById("canada-meter"),
        freedom: document.getElementById("canada-freedom"),
        resilience: document.getElementById("canada-resilience"),
      },
      mexico: {
        container: document.getElementById("mexico-meter"),
        freedom: document.getElementById("mexico-freedom"),
        resilience: document.getElementById("mexico-resilience"),
      },
      greenland: {
        container: document.getElementById("greenland-meter"),
        freedom: document.getElementById("greenland-freedom"),
        resilience: document.getElementById("greenland-resilience"),
      },
    },

    debug: {
      panel: document.getElementById("debug-panel"),
      toggleHitbox: document.getElementById("toggle-hitbox"),
      calibrateButton: document.getElementById("calibrate-button"),
      testAnimation: document.getElementById("test-animation"),
    },
  };
  // Create logger
  const logger = new GameLogger();
  window.logger = logger;

  if (DEBUG_MODE) {
    document.addEventListener("DOMContentLoaded", () => {
      logger.createDebugUI();
    });
  }

  function init() {
    logger.info("gameState", "Initializing game");

    // Special handling for mobile devices
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) {
      logger.info("device", "Mobile device detected, adding special audio handling");

      // Add an explicit note in the intro
      const introContent = document.querySelector(".intro-content");
      if (introContent) {
        const audioNote = document.createElement("p");
        audioNote.textContent = "Tap 'Start Game' to enable audio.";
        audioNote.style.fontWeight = "bold";
        audioNote.style.color = "#b22234";
        introContent.insertBefore(audioNote, elements.buttons.start);
      }
    }

    // Initialize AudioManager
    audioManager.init();
    audioManager.setLogger(logger);

    // Enable detailed audio logging in debug mode
    if (DEBUG_MODE) {
      logger.toggleCategory("audio", true);
      logger.toggleLevel("info", true);
      logger.toggleLevel("debug", true);
      logger.toggleLevel("trace", true);
    }

    // Preload important sounds
    audioManager.preloadGameSounds();

    // Log initial audio state
    audioManager.logAudioState();

    // Setup audio status indicator for mobile
    if (isMobile || DEBUG_MODE) {
      setupAudioStatusIndicator();
    }

    // Setup game controls
    setupGameControls();

    // Initialize Animation Manager
    if (typeof AnimationManager === "function") {
      logger.debug("animation", "Creating AnimationManager instance");

      animationManager = new AnimationManager();

      // Set debug mode if needed
      if (DEBUG_MODE) {
        animationManager.setDebugMode(true);
      }

      animationManager.init();

      // Initialize Smack Manager
      if (typeof SmackManager === "function") {
        logger.debug("animation", "Creating SmackManager instance");
        window.smackManager = new SmackManager(animationManager);
      } else {
        logger.error("animation", "SmackManager not found!");
      }
    } else {
      logger.error("animation", "AnimationManager not found!");
      return; // Exit if AnimationManager is not available
    }

    // Create Trump sprite elements
    const trumpElements = createTrumpSprite();

    // Fix mobile touch handling (improved version that fully replaces event handlers)
    fixMobileTouchHandling();

    // Position country flags when map loads
    elements.game.map.onload = function () {
      positionCountryFlagOverlays();
    };

    // Store reference to trump elements
    elements.trump = trumpElements;

    // Add event listeners
    setupEventListeners();

    // Initialize Debug Manager if in debug mode
    let audioDebugCleanup = null;
    if (DEBUG_MODE && typeof DebugManager === "function") {
      logger.debug("debug", "Initializing DebugManager");
      debugManager = new DebugManager(elements, gameState, animationManager);
      debugManager.init();

      // Set up debug panel and debug controls
      enhanceDebugPanel();

      // Fix audio debug controls
      audioDebugCleanup = fixDebugAudio();
    }

    // Initialize resize handling
    setupResponsiveHandling();

    logger.info("gameState", "Game initialization complete");

    // Keep only audio logging enabled by default
    logger.disableAllCategories();
    logger.toggleCategory("audio", true);
  }

  // Improved function that creates the Trump sprite but doesn't add event listeners
  function createTrumpSprite() {
    // Get existing container
    const trumpContainer = document.getElementById("trump-sprite-container");
    const trumpSprite = document.getElementById("trump-sprite");
    const handHitbox = document.getElementById("hand-hitbox");

    // Basic setup of dimensions and position
    if (handHitbox) {
      handHitbox.style.position = "absolute";
      handHitbox.style.zIndex = "2000";
      handHitbox.style.cursor = "pointer";
      handHitbox.style.pointerEvents = "all";

      // Make hitbox more visible for debugging
      if (DEBUG_MODE) {
        handHitbox.style.backgroundColor = "rgba(255, 0, 0, 0.3)";
        handHitbox.style.border = "2px solid red";
      }

      // We'll add event listeners in fixMobileTouchHandling instead
      logger.info("input", "Trump sprite created - event handlers will be added separately");
    }

    return {
      container: trumpContainer,
      sprite: trumpSprite,
      hand: handHitbox,
    };
  }

  // Improved function to fix mobile touch handling
  function fixMobileTouchHandling() {
    const handHitbox = document.getElementById("hand-hitbox");
    if (!handHitbox) {
      logger.error("input", "Hand hitbox not found for touch handling setup");
      return;
    }

    // Log what we're doing
    logger.info("input", "Setting up improved touch handling for mobile");

    // Make hitbox larger on mobile
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) {
      handHitbox.style.width = "80px";
      handHitbox.style.height = "80px";
      
      logger.debug("input", "Increased hitbox size for mobile");
    }

    // Clone the element to remove all existing event listeners
    const newHitbox = handHitbox.cloneNode(true);
    handHitbox.parentNode.replaceChild(newHitbox, handHitbox);
    
    // Add click handler for desktop
    newHitbox.addEventListener("click", function(event) {
      // Prevent default behaviors
      event.preventDefault();
      event.stopPropagation();
      
      logger.debug("input", "Hand click detected");
      
      // Only process if we have a valid target
      if (gameState.currentTarget && gameState.isPlaying && !gameState.isPaused) {
        logger.info("input", `Click defense against ${gameState.currentTarget}`);
        stopGrab(event);
      } else {
        logger.debug("input", "Click ignored - no valid target");
      }
    });
    
    // Add touch handler for mobile with proper options
    newHitbox.addEventListener("touchstart", function(event) {
      // Always prevent default first to avoid scrolling/zooming
      event.preventDefault();
      event.stopPropagation();
      
      logger.debug("input", "Hand touch detected");
      
      // Provide haptic feedback
      if (navigator.vibrate) {
        navigator.vibrate(50);
      }
      
      // Add visual feedback
      const ripple = document.createElement("div");
      ripple.className = "touch-ripple";
      this.appendChild(ripple);
      
      // Remove ripple after animation completes
      setTimeout(() => {
        if (ripple.parentNode === this) {
          this.removeChild(ripple);
        }
      }, 500);
      
      // Only process if we have a valid target
      if (gameState.currentTarget && gameState.isPlaying && !gameState.isPaused) {
        logger.info("input", `Touch defense against ${gameState.currentTarget}`);
        stopGrab(event);
      } else {
        logger.debug("input", "Touch ignored - no valid target");
      }
    }, {passive: false}); // passive: false is crucial for preventing scrolling on iOS
    
    logger.info("input", "Touch and click handlers set up successfully");
    
    // Also prevent scrolling on the game container for mobile
    if (isMobile) {
      const gameContainer = document.getElementById("game-container");
      if (gameContainer) {
        gameContainer.addEventListener("touchmove", function(e) {
          if (gameState.isPlaying) {
            e.preventDefault();
          }
        }, {passive: false});
        
        logger.debug("input", "Added touchmove prevention to game container");
      }
      
      // Add mobile guidance
      showMobileGuidance();
    }
  }

  function showMobileGuidance() {
    const gameScreen = document.getElementById("game-screen");
    if (!gameScreen) return;
    
    // Create guidance message
    const guidance = document.createElement("div");
    guidance.id = "mobile-guidance";

  function scheduleNextGrab() {
    // Clear any existing timer
    if (gameState.grabTimer) {
      clearTimeout(gameState.grabTimer);
      gameState.grabTimer = null;
      logger.debug("animation", "Cleared existing grab timer");
    }

    // when this isn't set to zero there's a pause before grabbing
    const grabInterval = 0;

    logger.debug("gameState", `Scheduling next grab in ${grabInterval.toFixed(0)}ms at ${gameState.gameSpeedMultiplier.toFixed(2)}x speed`);

    // Set the timer for the next grab sequence
    gameState.grabTimer = setTimeout(() => {
      if (gameState.isPlaying && !gameState.isPaused) {
        // Check current animation state
        const currentState = animationManager ? animationManager.currentState : null;

        // Don't interrupt a victory or grab animation
        if (currentState === "victory" || (currentState && currentState.startsWith("grab"))) {
          logger.debug("animation", `${currentState} animation in progress, delaying grab`);
          // Reschedule after a short delay
          setTimeout(() => scheduleNextGrab(), 500);
          return;
        }

        // Now safe to start the grab sequence
        playIdleThenGrab();
      }
    }, grabInterval);
  }

  function playIdleThenGrab() {
    if (!animationManager) {
      logger.error("animation", "Animation manager not found, attempting direct grab");
      initiateGrab();
      return;
    }

    // Check if we're in a grab or victory animation
    const currentState = animationManager.currentState;
    const isGrabAnimation = currentState && currentState.startsWith("grab");
    const isVictoryAnimation = currentState === "victory";

    // Always transition through idle if coming from a grab or victory animation
    if (isGrabAnimation || isVictoryAnimation) {
      logger.debug("animation", `Transitioning from ${currentState} to idle before next grab`);
      animationManager.changeState("idle", () => {
        if (gameState.isPlaying && !gameState.isPaused) {
          logger.debug("animation", "Idle animation completed, initiating grab");
          initiateGrab();
        }
      });
    }
    // If already in idle, we need to handle both cases:
    // 1. Idle is in the middle of its animation
    // 2. Idle just completed its animation (at loop max)
    else if (currentState === "idle") {
      logger.debug("animation", "Already in idle state");

      // If this is immediately after a reaction, initiate grab right away
      if (gameState.idleAfterReaction) {
        logger.debug("animation", "Transitioning directly from reaction idle to grab");
        initiateGrab();
        return;
      }

      // Get idle animation details
      const idleAnim = animationManager.animations.idle;
      const maxLoops = idleAnim.maxLoops;
      const currentLoop = animationManager.loopCount;

      // Check if idle has JUST completed its full cycle
      if (currentLoop >= maxLoops) {
        logger.debug("animation", "Idle animation already completed its cycles, initiating grab immediately");
        // Don't start a new idle animation - just grab
        initiateGrab();
      }
      // Otherwise, idle is still in progress
      else {
        logger.debug("animation", "Waiting for idle to complete before grab");

        // Replace the completion function to initiate grab after idle completes
        animationManager.onAnimationEnd = () => {
          logger.debug("animation", "Idle animation completed naturally, initiating grab");

          // Initiate the grab after idle completes
          if (gameState.isPlaying && !gameState.isPaused) {
            initiateGrab();
          }
        };
      }
    }
    // For any other state, transition to idle first
    else {
      logger.debug("animation", `Transitioning from ${currentState} to idle before grab`);
      animationManager.changeState("idle", () => {
        if (gameState.isPlaying && !gameState.isPaused) {
          logger.debug("animation", "Idle animation completed, initiating grab");
          initiateGrab();
        }
      });
    }
  }

  function initiateGrab() {
    // Check game state
    if (!gameState.isPlaying || gameState.isPaused) {
      logger.debug("gameState", "Grab attempt canceled - game not playing or paused");
      return;
    }

    audioManager.playGrabWarning();

    // Select a random country that's not fully claimed
    const availableCountries = Object.keys(gameState.countries).filter((country) => {
      return gameState.countries[country].claims < gameState.countries[country].maxClaims;
    });

    if (availableCountries.length === 0) {
      logger.debug("gameState", "No available countries to grab, scheduling next attempt");
      scheduleNextGrab();
      return;
    }

    // Select random country
    const targetIndex = Math.floor(Math.random() * availableCountries.length);
    const targetCountry = availableCountries[targetIndex];
    gameState.currentTarget = targetCountry;

    logger.info("gameState", `Initiating grab on ${targetCountry}`);

    // Choose an animation for this country
    const possibleAnimations = gameState.countryAnimations[targetCountry];
    const animIndex = Math.floor(Math.random() * possibleAnimations.length);
    const animationName = possibleAnimations[animIndex]; // Define it before logging it!

    // Store the specific animation we're using
    gameState.currentAnimation = animationName;

    // Additional tracking for East/West Canada
    gameState.isEastCanadaGrab = animationName === "grabEastCanada";
    gameState.isWestCanadaGrab = animationName === "grabWestCanada";

    // Now it's safe to log the animation name
    logger.debug(
      "animation",
      `Starting grab animation: ${animationName}, frameCount: ${animationManager.animations[animationName]?.frameCount}, maxLoops: ${animationManager.animations[animationName]?.maxLoops}`
    );

    // Make sure we can play this animation
    if (!animationManager.animations[animationName]) {
      logger.error("animation", `Animation "${animationName}" not found, falling back to idle`);
      // Still schedule next grab to avoid game getting stuck
      setTimeout(() => scheduleNextGrab(), 1000);
      return;
    }

    // Log when we're setting up the callback
    logger.debug("animation", `Setting up completion callback for ${animationName}`);

    // Play the grab animation with better logging
    animationManager.changeState(animationName, () => {
      // Log the exact state when callback is triggered
      logger.debug(
        "animation",
        `Grab animation "${animationName}" completion callback triggered. Current target: ${gameState.currentTarget}, Original target: ${targetCountry}`
      );

      // If animation completed without being stopped (player didn't block)
      if (gameState.currentTarget === targetCountry && gameState.isPlaying && !gameState.isPaused) {
        logger.debug("animation", `Animation "${animationName}" completed without being blocked, processing grab success`);
        grabSuccess(targetCountry);
      } else {
        logger.debug(
          "animation",
          `Animation "${animationName}" completed but conditions changed, not processing grab. isPlaying: ${gameState.isPlaying}, isPaused: ${gameState.isPaused}`
        );
        // If something interrupted the grab, still schedule the next one
        if (gameState.isPlaying && !gameState.isPaused) {
          scheduleNextGrab();
        }
      }
    });

    // Play grab sound
    audioManager.playGrabAttempt(targetCountry);
  }

  function stopGrab(event) {
    audioManager.logAudioState();

    const targetCountry = gameState.currentTarget;
    if (!targetCountry) {
      logger.debug("input", "stopGrab called but no current target");
      return;
    }

    logger.debug(
      "animation",
      `stopGrab called for ${targetCountry}. Current animation: ${animationManager.currentState}, frame: ${animationManager.currentFrame}/${
        animationManager.animations[animationManager.currentState]?.frameCount
      }, loop: ${animationManager.loopCount}/${animationManager.maxLoops}`
    );

    // Reset current target immediately to prevent any other handlers from triggering
    const smackCountry =
      targetCountry === "canada"
        ? gameState.isEastCanadaGrab
          ? "eastCanada"
          : gameState.isWestCanadaGrab
          ? "westCanada"
          : targetCountry
        : targetCountry; // Keep the original country name for non-Canada targets

    audioManager.playSuccessfulBlock(smackCountry);

    gameState.currentTarget = null;
    gameState.isEastCanadaGrab = false;
    gameState.isWestCanadaGrab = false;

    // Increase score
    gameState.score += 10;
    logger.debug("gameState", `Score increased to ${gameState.score}`);

    // Track consecutive hits and stats
    gameState.consecutiveHits++;
    gameState.stats.successfulBlocks++;

    // Increase country resilience
    const country = gameState.countries[targetCountry];
    country.resilience++;
    logger.debug("gameState", `${targetCountry} resilience increased to ${country.resilience}/${country.maxResilience}`);

    // Play resilience sound based on new level
    audioManager.playResilienceSound(country.resilience);

    // Update resilience meter
    updateCountryMeters(targetCountry);

    // Check for immunity
    if (country.resilience >= country.maxResilience) {
      gameState.stats.countriesDefended++;
    }

    // Update HUD
    updateHUD();

    // Handle animation sequence with clear transitions
    if (window.smackManager) {
      logger.debug("animation", `Playing smack animation for ${smackCountry}`);

      smackManager.playSmackAnimation(smackCountry, () => {
        // Small gap between smack and reaction
        logger.debug("animation", "Smack impact triggered, changing to slapped animation shortly");

        setTimeout(() => {
          // Slapped animation -> idle animation -> schedule next grab
          logger.debug("animation", "Transitioning to slapped animation");

          animationManager.changeState("slapped", () => {
            // Transition to idle animation
            logger.debug("animation", "Slapped animation completed, transitioning to idle");

            // Set a flag to indicate this idle should immediately chain to next grab
            gameState.idleAfterReaction = true;

            animationManager.changeState("idle", () => {
              // Schedule next grab only after idle animation fully completes
              logger.debug("animation", "Idle animation completed, scheduling next grab");
              gameState.idleAfterReaction = false;
              scheduleNextGrab();
            });
          });
        }, 200);
      });
    } else {
      // Fallback path
      logger.warn("animation", "SmackManager not found, using fallback animation transition");

      animationManager.changeState("slapped", () => {
        animationManager.changeState("idle", () => {
          scheduleNextGrab();
        });
      });
    }
  }

  function grabSuccess(country) {
    audioManager.logAudioState();

    logger.debug("gameState", `grabSuccess called for ${country} from: ${new Error().stack.split("\n")[2]}`);

    // Reset consecutive hits
    gameState.consecutiveHits = 0;

    // Speed up the game slightly with each successful grab
    updateGameSpeed(gameState.gameSpeedMultiplier + 0.05);

    logger.info("gameState", `Grab succeeded on ${country}`);

    // Reset current target
    gameState.currentTarget = null;

    // Handle East/West Canada special case
    if (country === "eastCanada" || country === "westCanada") {
      // Increment claim on the shared Canada entity
      gameState.countries.canada.claims++;

      // Get current claim count from the shared Canada entity
      const claimCount = gameState.countries.canada.claims;
      logger.debug("gameState", `Canada claim count: ${claimCount}/${gameState.countries.canada.maxClaims}`);

      // Play appropriate sounds based on grab count
      if (claimCount < gameState.countries.canada.maxClaims) {
        // First and second grabs - success sound
        audioManager.playSuccessfulGrab("canada");
      } else {
        // Final grab (complete annexation) - annexation sound
        audioManager.playCountryAnnexed("canada");
        logger.info("gameState", `Canada fully annexed`);
      }

      // Decrease freedom based on claim count
      const freedomPercentages = [66, 33, 0]; // Freedom percentages after 1, 2, 3 claims
      gameState.countries.canada.freedom = freedomPercentages[claimCount - 1];
      logger.debug("gameState", `Canada freedom reduced to ${gameState.countries.canada.freedom}%`);

      // Update flag overlay opacity
      const flagOverlay = document.getElementById(`canada-flag-overlay`);
      if (flagOverlay) {
        const opacityLevels = [0.33, 0.66, 1.0];
        flagOverlay.style.opacity = opacityLevels[claimCount - 1] || 0;
      }

      // Update meters
      updateCountryMeters("canada");
    } else {
      // Normal processing for other countries
      gameState.countries[country].claims++;

      // Get current claim count
      const claimCount = gameState.countries[country].claims;
      logger.debug("gameState", `${country} claim count: ${claimCount}/${gameState.countries[country].maxClaims}`);

      // Play appropriate sounds based on grab count
      if (claimCount < gameState.countries[country].maxClaims) {
        // First and second grabs - success sound
        audioManager.playSuccessfulGrab(country);
      } else {
        // Final grab (complete annexation) - annexation sound
        audioManager.playCountryAnnexed(country);
      }

      // Decrease freedom based on claim count
      const freedomPercentages = [66, 33, 0]; // Freedom percentages after 1, 2, 3 claims
      gameState.countries[country].freedom = freedomPercentages[claimCount - 1];
      logger.debug("gameState", `${country} freedom reduced to ${gameState.countries[country].freedom}%`);

      // Update flag overlay opacity
      const flagOverlay = document.getElementById(`${country}-flag-overlay`);
      if (flagOverlay) {
        const opacityLevels = [0.33, 0.66, 1.0];
        flagOverlay.style.opacity = opacityLevels[claimCount - 1] || 0;
      }

      // Update meters
      updateCountryMeters(country);
    }

    // Check if country is fully claimed
    let checkCountry = country;
    if (country === "eastCanada" || country === "westCanada") {
      checkCountry = "canada";
    }

    const claimCount = gameState.countries[checkCountry].claims;
    if (claimCount >= gameState.countries[checkCountry].maxClaims) {
      // Count total annexed countries
      const annexedCount = Object.keys(gameState.countries).filter(
        (c) => gameState.countries[c].claims >= gameState.countries[c].maxClaims
      ).length;

      // Update music intensity
      audioManager.updateMusicIntensity(annexedCount);

      // Check if all countries are claimed (lose condition)
      const countriesToCheck = ["canada", "mexico", "greenland"];
      const claimedCountries = countriesToCheck.filter((c) => gameState.countries[c].claims >= gameState.countries[c].maxClaims);

      logger.debug("gameState", `${claimedCountries.length}/${countriesToCheck.length} countries fully claimed`);

      if (claimedCountries.length >= countriesToCheck.length) {
        logger.info("gameState", "All countries claimed - ending game (lose)");
        endGame(false); // Game over, player lost
        return;
      }
    }
    // The grab timer will handle scheduling the next grab
    logger.debug("animation", "Playing victory animation after successful grab");

    animationManager.changeState("victory", () => {
      logger.debug("animation", "Victory animation completed, transitioning to idle");

      // Explicitly change to idle when victory completes
      animationManager.changeState("idle");

      // After victory is done and we're in idle, schedule the next grab
      scheduleNextGrab();
    });
  }

  function setupProgressiveDifficulty() {
    // Start at normal speed
    gameState.gameSpeedMultiplier = 3.0;

    // Increase speed every 20 seconds
    const difficultyInterval = setInterval(() => {
      if (!gameState.isPlaying || gameState.isPaused) return;

      // Increase speed by 10%
      const newSpeed = gameState.gameSpeedMultiplier * 1.1;

      // Cap at maximum speed (2.5x)
      if (newSpeed <= 2.5) {
        updateGameSpeed(newSpeed);
        logger.info("gameState", `Increasing game speed to ${gameState.gameSpeedMultiplier.toFixed(2)}x`);
      }
    }, 20000); // 20 seconds

    // Store the interval so it can be cleared when the game ends
    gameState.difficultyInterval = difficultyInterval;
  }

  function updateCountryMeters(countryId) {
    const country = gameState.countries[countryId];
    const meter = elements.meters[countryId];

    // Update freedom meter (decreases as claims increase)
    meter.freedom.style.width = `${country.freedom}%`;

    // Update resilience meter (increases as player successfully defends)
    const resiliencePercent = (country.resilience / country.maxResilience) * 100;
    meter.resilience.style.width = `${resiliencePercent}%`;
  }

  function updateGameSpeed(newMultiplier) {
    // Make sure we're using the same variable names
    gameState.gameSpeedMultiplier = Math.max(gameState.minSpeedMultiplier, Math.min(gameState.maxSpeedMultiplier, newMultiplier));

    // Update animation manager
    if (animationManager) {
      animationManager.setGameSpeed(gameState.gameSpeedMultiplier);
    }

    logger.debug("gameState", `Game speed set to ${gameState.gameSpeedMultiplier.toFixed(2)}x`);

    // If a grab is scheduled, reschedule with new timing
    if (gameState.grabTimer) {
      clearTimeout(gameState.grabTimer);
      scheduleNextGrab();
    }
  }

  function endGame(playerWon) {
    audioManager.logAudioState();

    if (debugManager) {
      debugManager.cleanup();
    }

    audioManager.stopAll();
    audioManager.stopBackgroundMusic();

    gameState.isPlaying = false;

    // Clear all timers
    clearInterval(gameState.countdownTimer);
    clearTimeout(gameState.grabTimer);
    if (gameState.difficultyInterval) {
      clearInterval(gameState.difficultyInterval);
      gameState.difficultyInterval = null;
    }

    // Stop any ongoing animations
    animationManager.stop();

    // Hide game screen, show game over screen
    elements.screens.game.classList.add("hidden");
    elements.screens.gameOver.classList.remove("hidden");

    // Update game over screen
    elements.hud.finalScore.textContent = gameState.score;
    elements.hud.stats.blocks.textContent = gameState.stats.successfulBlocks;
    elements.hud.stats.defended.textContent = gameState.stats.countriesDefended;
    elements.hud.stats.time.textContent = 60 - gameState.timeRemaining;

    if (playerWon) {
      elements.hud.result.textContent = "Victory!";
      elements.hud.message.textContent = "You successfully defended the neighboring countries from annexation! Your resistance was effective.";
      audioManager.play("ui", "win");

      // Trump looks defeated
      animationManager.changeState("slapped");
    } else {
      elements.hud.result.textContent = "Game Over";
      elements.hud.message.textContent =
        "The neighboring countries have been claimed. Don't give up - resistance can still work if we keep trying!";
      audioManager.play("ui", "lose");

      // Trump looks victorious
      animationManager.changeState("victory");
    }
  }

  function restartGame() {
    // Play UI click sound
    audioManager.play("ui", "click");

    elements.screens.gameOver.classList.add("hidden");
    elements.screens.game.classList.remove("hidden");

    resetGameState();

    gameState.countdownTimer = setInterval(updateCountdown, 1000);
    scheduleNextGrab();

    gameState.isPlaying = true;

    // Make sure everything is positioned correctly
    setTimeout(positionElements, 100);

    setTimeout(() => {
      audioManager.startBackgroundMusic();
    }, 1000);
  }

  function shareResults() {
    const text = `I scored ${
      gameState.score
    } points in Presidential Grab, a satirical resistance game! I defended countries from annexation for ${
      60 - gameState.timeRemaining
    } seconds. Can you do better?`;

    if (navigator.share) {
      navigator
        .share({
          title: "Presidential Grab Game",
          text: text,
          url: window.location.href,
        })
        .catch(console.error);
    } else {
      // Fallback for browsers that don't support Web Share API
      alert("Share this message:\n\n" + text);
    }
  }

  // Initialize game when page loads
  init();
});
      

 </script>
